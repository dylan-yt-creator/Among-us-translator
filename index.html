<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Among Us Translator</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="stars"></div>
  
  <div class="info-panel">
      <p>⚡ Translator Status: ONLINE</p>
      <p id="charCount">Characters: 0</p>
  </div>
  
  <div class="tips">
      <h3>Random Sus Message</h3>
      <p id="susMessage">"Red is kinda sus..."</p>
      <button onclick="newSusMessage()">NEW MESSAGE</button>
  </div>
  
  <h1>My Custom Among Us Translator</h1>

  <div class="controls">
    <button onclick="toggleDirection()">🔁 Switch Direction</button>
    <button onclick="setTheme('light')">☀️</button>
    <button onclick="setTheme('dark')">🌙</button>
    <button onclick="setTheme('system')">🌗</button>
  </div>

  <p id="modeLabel">Mode: English → Among Us</p>

  <textarea id="inputText" placeholder="Enter text..."></textarea>
  
  <h2>Output:</h2>
  <textarea id="outputText" readonly></textarea>
    <button onclick="copyOutput()">📋 COPY</button>
    <button onclick="speakOutput()">🔊 READ</button>
  
  <script src="script.js"></script>
</body>
</html>
